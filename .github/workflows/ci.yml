name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Version sync
        run: bash scripts/version-sync.sh

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Check
        run: cargo check --workspace

      - name: Schema snapshot
        run: |
          cargo run -q -- capabilities --home /tmp/shiro-ci 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['ok'] == True
          r = data['result']
          assert 'version' in r
          assert 'schemaVersion' in r
          assert 'state_machine' in r
          assert 'id_schemes' in r
          assert 'parsers' in r
          assert 'features' in r
          assert 'storage' in r
          assert r['state_machine']['states'] == ['STAGED','INDEXING','READY','FAILED','DELETED']
          print('Schema contract verified')
          "

      - name: Capabilities parity check
        run: bash scripts/check-capabilities.sh

      - name: MCP smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' | \
            timeout 5 cargo run -q -- --home /tmp/shiro-mcp-ci --log-level silent mcp 2>/dev/null | \
            python3 -c "
          import json, sys
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              data = json.loads(line)
              if 'jsonrpc' in data:
                  assert data['result']['protocolVersion'] == '2024-11-05'
                  assert data['result']['serverInfo']['name'] == 'shiro'
                  print('MCP handshake verified')
                  break
          "

      - name: CLI smoke test (fixture-based)
        run: |
          set -euo pipefail
          SHIRO_HOME=$(mktemp -d)
          trap 'rm -rf "$SHIRO_HOME"' EXIT

          # 1. --help exits cleanly
          cargo run -q -- --help >/dev/null

          # 2. init
          cargo run -q -- init --home "$SHIRO_HOME" 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['ok'] == True, 'init failed'
          print('init OK')"

          # 3. add fixture
          cargo run -q -- add --home "$SHIRO_HOME" fixtures/tiny.md 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['ok'] == True, 'add failed'
          assert 'result' in data
          print('add OK')"

          # 4. ingest
          cargo run -q -- ingest --home "$SHIRO_HOME" 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['ok'] == True, 'ingest failed'
          print('ingest OK')"

          # 5. search for known content
          cargo run -q -- search --home "$SHIRO_HOME" 'shiro' 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['ok'] == True, 'search failed'
          assert 'result' in data
          print('search OK: found', len(data['result'].get('hits', data['result'].get('results', []))), 'results')"

          # 6. JSON error path: read non-existent doc
          # The command exits non-zero on error (correct behavior),
          # so capture output first, then validate the JSON envelope.
          ERROR_JSON=$(cargo run -q -- read --home "$SHIRO_HOME" nonexistent_doc_id 2>/dev/null || true)
          echo "$ERROR_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['ok'] == False, 'expected error'
          assert 'error' in data
          assert 'code' in data['error']
          assert 'message' in data['error']
          print('error contract OK: code=' + data['error']['code'])"

          echo 'All smoke tests passed'

  nix:
    name: Nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Flake check
        run: nix flake check
      - name: Nix build
        run: nix build
