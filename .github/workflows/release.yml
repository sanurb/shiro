name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Quality gate (same as CI, runs from the tag commit) ─────────────
  gate:
    name: Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Check
        run: cargo check --workspace

      - name: Verify embedded version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BIN_VERSION=$(cargo run -q -- --version | awk '{print $2}')
          if [ "$TAG" != "$BIN_VERSION" ]; then
            echo "FATAL: tag=$TAG but binary reports $BIN_VERSION"
            exit 1
          fi

  # ── Build release binaries per target triple ────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p shiro-cli

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="shiro-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/shiro" "dist/${ARCHIVE}/shiro"
          cp LICENSE* README.md CHANGELOG.md "dist/${ARCHIVE}/" 2>/dev/null || true
          cd dist
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ASSET=dist/${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Create GitHub Release with checksums ────────────────────────────
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets and compute checksums
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "shiro ${{ github.ref_name }}"
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.

            ## Checksums (SHA-256)
            ```
            $(cat release/SHA256SUMS.txt)
            ```
          files: |
            release/*.tar.gz
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true
