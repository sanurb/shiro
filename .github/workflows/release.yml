name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Normalise: workflow_dispatch passes tag via input, push/tag has it in ref_name
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # ‚îÄ‚îÄ Quality gate (same as CI, runs from the tag commit) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  gate:
    name: Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Check
        run: cargo check --workspace

      - name: Verify embedded version matches tag
        run: |
          TAG="${RELEASE_TAG#v}"
          BIN_VERSION=$(cargo run -q -- --version | awk '{print $2}')
          if [ "$TAG" != "$BIN_VERSION" ]; then
            echo "FATAL: tag=$TAG but binary reports $BIN_VERSION"
            exit 1
          fi

  # ‚îÄ‚îÄ Build release binaries per target triple ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  build:
    name: Build ${{ matrix.target }}
    needs: gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p shiro-cli

      - name: Package
        run: |
          ARCHIVE="shiro-cli-${RELEASE_TAG}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/shiro" "dist/${ARCHIVE}/shiro"
          cp LICENSE* README.md CHANGELOG.md "dist/${ARCHIVE}/" 2>/dev/null || true
          cd dist
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ASSET=dist/${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          echo "ASSET_NAME=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ‚îÄ‚îÄ Create GitHub Release with checksums ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets and compute checksums
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "shiro ${{ env.RELEASE_TAG }}"
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ env.RELEASE_TAG }}/CHANGELOG.md) for details.

            ## Checksums (SHA-256)
            ```
            $(cat release/SHA256SUMS.txt)
            ```
          files: |
            release/*.tar.gz
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true

  # ‚îÄ‚îÄ Publish npm package ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  npm-publish:
    name: Publish npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version alignment (tag ‚Üî package.json ‚Üî Cargo.toml)
        run: |
          TAG="${RELEASE_TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=$TAG pkg=$PKG_VERSION cargo=$CARGO_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ] || [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "FATAL: version mismatch ‚Äî tag=$TAG, package.json=$PKG_VERSION, Cargo.toml=$CARGO_VERSION"
            exit 1
          fi

      - name: Guard ‚Äî version must be newer than npm latest
        run: |
          TAG="${RELEASE_TAG#v}"
          LATEST=$(npm view @sanurb/shiro-cli version 2>/dev/null || echo "0.0.0")
          echo "tag=$TAG npm-latest=$LATEST"
          if npx semver "$TAG" -r "<=$LATEST" 2>/dev/null; then
            echo "FATAL: tag $TAG is not newer than published $LATEST"
            exit 1
          fi
          echo "OK: $TAG is newer than $LATEST"

      - name: Guard ‚Äî GitHub Release must exist for tag
        run: |
          gh release view "${RELEASE_TAG}" --json tagName --jq .tagName
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
