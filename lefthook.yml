pre-commit:
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings

pre-push:
  commands:
    check:
      run: cargo check --workspace
    test:
      run: cargo test --workspace
